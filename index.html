<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookReader TTS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="logo">
                <i class="fas fa-book-open-reader"></i>
                BookReader TTS
            </div>
            <div class="book-title" id="book-title">No Book Loaded</div>
            <div class="header-actions">
                <button id="btn-new-book" title="Load New Book"><i class="fas fa-file-upload"></i></button>
                <button id="btn-toggle-sidebar" title="Toggle Sidebar"><i class="fas fa-bars"></i></button>
            </div>
        </header>
        <div class="main-workspace">
            <aside class="sidebar hidden" id="sidebar">
                <div class="sidebar-header"><h3>Navigation</h3></div>
                <ul class="nav-list" id="nav-list"></ul>
            </aside>
            <main class="content-area">
                <div class="upload-view" id="upload-view">
                    <div class="drop-zone" id="drop-zone">
                        <i class="fas fa-cloud-upload-alt drop-icon"></i>
                        <h2>Drag & Drop your Book</h2>
                        <p>Supports <strong>.epub</strong> and <strong>.pdf</strong> files</p>
                        <span class="or-divider">OR</span>
                        <label for="file-input" class="btn-primary">Browse Files</label>
                        <input type="file" id="file-input" accept=".pdf,.epub" hidden>
                    </div>
                </div>
                <div class="reader-view hidden" id="reader-view">
                    <div class="content-container" id="content-container"></div>
                </div>
            </main>
        </div>
        <div class="progress-bar-container hidden" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <footer class="bottom-controls hidden" id="bottom-controls">
            <div class="nav-controls">
                <button class="btn-icon" id="btn-prev" title="Previous Section"><i class="fas fa-step-backward"></i></button>
                <span id="page-indicator">0 / 0</span>
                <button class="btn-icon" id="btn-next" title="Next Section"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="playback-controls">
                <button class="btn-icon btn-large" id="btn-play-pause" title="Play / Pause"><i class="fas fa-play"></i></button>
                <button class="btn-icon" id="btn-stop" title="Stop"><i class="fas fa-stop"></i></button>
            </div>
            <div class="settings-controls">
                <div class="setting-group">
                    <i class="fas fa-tachometer-alt" title="Speed"></i>
                    <select id="speed-select" class="control-select">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                </div>
                <div class="setting-group">
                    <i class="fas fa-head-side-cough" title="Voice"></i>
                    <select id="voice-select" class="control-select">
                        <option value="">Loading voices...</option>
                    </select>
                </div>
            </div>
        </footer>
        <div class="loading-overlay hidden" id="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text">Loading Book...</p>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
